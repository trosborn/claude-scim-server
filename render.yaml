services:
  - type: web
    name: scim-server
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: scim-db
          property: connectionString
      - key: SCIM_AUTH_TOKEN
        generateValue: true   # Render generates a random value; copy it into Okta

databases:
  - name: scim-db
    plan: free
    databaseName: scim_server
    user: scim_user
